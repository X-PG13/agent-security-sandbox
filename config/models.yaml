models:
  openai:
    gpt-4:
      name: "gpt-4"
      provider: "openai"
      max_tokens: 8192
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.03
        output: 0.06

    gpt-3.5-turbo:
      name: "gpt-3.5-turbo"
      provider: "openai"
      max_tokens: 4096
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.0015
        output: 0.002

  anthropic:
    claude-3-opus:
      name: "claude-3-opus-20240229"
      provider: "anthropic"
      max_tokens: 4096
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.015
        output: 0.075

    claude-3-sonnet:
      name: "claude-3-sonnet-20240229"
      provider: "anthropic"
      max_tokens: 4096
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.003
        output: 0.015

    claude-3-haiku:
      name: "claude-3-haiku-20240307"
      provider: "anthropic"
      max_tokens: 4096
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.00025
        output: 0.00125

  openai-compatible:
    # OpenAI-compatible endpoints (vLLM, Ollama, LiteLLM, LocalAI, etc.)
    # Set OPENAI_BASE_URL or pass base_url when creating the client.
    # An API key is optional for most local providers.
    default:
      name: "default"
      provider: "openai-compatible"
      max_tokens: 4096
      temperature: 0.7
      base_url: null          # override via env var or at runtime
      api_key_required: false

# Default model for experiments
default:
  model: "gpt-3.5-turbo"
  provider: "openai"
