models:
  openai:
    gpt-4o:
      name: "gpt-4o"
      provider: "openai"
      max_tokens: 16384
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.0025
        output: 0.01

    gpt-4o-mini:
      name: "gpt-4o-mini"
      provider: "openai"
      max_tokens: 16384
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.00015
        output: 0.0006

  anthropic:
    claude-sonnet-4-5:
      name: "claude-sonnet-4-5-20250929"
      provider: "anthropic"
      max_tokens: 8192
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.003
        output: 0.015

    claude-haiku-4-5:
      name: "claude-haiku-4-5-20251001"
      provider: "anthropic"
      max_tokens: 8192
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.0008
        output: 0.004

    claude-opus-4:
      name: "claude-opus-4-20250514"
      provider: "anthropic"
      max_tokens: 8192
      temperature: 0.7
      cost_per_1k_tokens:
        input: 0.015
        output: 0.075

  openai-compatible:
    # OpenAI-compatible endpoints (vLLM, Ollama, LiteLLM, LocalAI, gateways, etc.)
    # Set OPENAI_BASE_URL or pass base_url when creating the client.
    # An API key is optional for most local providers.
    #
    # Models used in our experiments via OpenAI-compatible proxy:
    #   - deepseek-v3-1-250821  (DeepSeek V3.1)
    #   - gemini-2.5-flash      (Google Gemini 2.5 Flash)
    default:
      name: "default"
      provider: "openai-compatible"
      max_tokens: 4096
      temperature: 0.7
      base_url: null          # override via env var or at runtime
      api_key_required: false

# Default model for experiments
default:
  model: "gpt-4o"
  provider: "openai"
