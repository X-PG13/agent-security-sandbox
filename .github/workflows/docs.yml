name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "GETTING_STARTED.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[docs]"
      - run: mkdocs build --strict
      - run: |
          tar \
            --directory site \
            --dereference \
            --hard-dereference \
            --create \
            --file github-pages.tar \
            .
          gzip --force github-pages.tar
      - uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: github-pages.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
