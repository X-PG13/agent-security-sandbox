name: Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.json"
      - ".github/workflows/labels.yml"
      - "scripts/sync_labels.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python scripts/sync_labels.py --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
