name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      # PyPI publish disabled until trusted publisher is configured
      # - uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     skip-existing: true
